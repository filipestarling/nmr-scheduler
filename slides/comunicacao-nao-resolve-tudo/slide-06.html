<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;overflow:hidden;background:#1C0D33;font-family:'Inter','Segoe UI',Arial,sans-serif;display:flex;flex-direction:column;position:relative}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 800px 600px at 50% 0%,#2D1555 0%,transparent 70%),radial-gradient(ellipse 600px 500px at 100% 100%,#0E0620 0%,transparent 60%);pointer-events:none}
.series-top{text-align:center;padding:56px 0 0;font-family:'Lora',Georgia,serif;font-size:32px;font-weight:500;color:#C4B5FD;font-style:italic;position:relative;z-index:2}
.content{flex:1;display:flex;flex-direction:column;justify-content:center;padding:80px;position:relative;z-index:2;gap:44px}
.headline{font-family:'Lora',Georgia,serif;font-size:68px;font-weight:600;line-height:1.2;color:#FFFFFF}
.accent-coral{color:#F87171;font-style:italic}
.accent{color:#C4B5FD;font-style:italic}
.divider{width:72px;height:3px;background:linear-gradient(90deg,#7C3AED,#C4B5FD);border-radius:2px}
.body-text{font-size:38px;font-weight:400;color:#E2D9F3;line-height:1.6;text-align:justify}
</style></head>
<body>
<div class="series-top">@naomonogamiaresponsavel</div>
<div class="content">
  <h2 class="headline">Comunicação é <span class="accent-coral">ferramenta</span> — não <span class="accent">fundamento</span>.</h2>
  <div class="divider"></div>
  <p class="body-text">Isso não desvaloriza o papel da comunicação. Apenas a coloca no lugar certo: ela é meio, não fim. É o que abre espaço — mas não o que sustenta o vínculo sozinha.</p>
</div>
</body></html>
