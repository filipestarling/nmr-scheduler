<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;overflow:hidden;background:#1C0D33;font-family:'Inter','Segoe UI',Arial,sans-serif;display:flex;flex-direction:column;position:relative}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 800px 600px at 50% 0%,#2D1555 0%,transparent 70%),radial-gradient(ellipse 600px 500px at 100% 100%,#0E0620 0%,transparent 60%);pointer-events:none}
.series-top{text-align:center;padding:56px 0 0;font-family:'Lora',Georgia,serif;font-size:32px;font-weight:500;color:#C4B5FD;font-style:italic;position:relative;z-index:2}
.content{flex:1;display:flex;flex-direction:column;justify-content:center;padding:80px;position:relative;z-index:2;gap:44px}
.headline{font-family:'Lora',Georgia,serif;font-size:78px;font-weight:600;line-height:1.18;color:#FFFFFF;letter-spacing:-0.005em}
.headline .accent-coral{color:#F87171;font-style:italic}
.divider{width:80px;height:4px;background:linear-gradient(90deg,#7C3AED,#C4B5FD);border-radius:2px}
.body-text{font-size:40px;font-weight:500;color:#E2D9F3;line-height:1.55}
.body-text .accent{color:#C4B5FD;font-style:italic;font-weight:600}
.pill-inline{display:inline-block;padding:2px 22px;background:#7C3AED;color:#FFFFFF;border-radius:100px;font-weight:600;font-style:normal;font-size:38px;vertical-align:2px;margin:0 4px}.pill-coral{display:inline-block;padding:2px 22px;background:#F87171;color:#FFFFFF;border-radius:100px;font-weight:600;font-style:normal;font-size:38px;vertical-align:2px;margin:0 4px}
</style>
</head>
<body>
<div class='series-top'>Filipe Starling · Psicólogo Clínico e Terapeuta de Casais</div>
<div class='content'>
<h1 class='headline'>Está tendo <span class='accent-coral'>dificuldades</span> com a não monogamia?</h1>
<div class='divider'></div>
<p class='body-text'>Para fazer parte do grupo de apoio <span class='accent'>sos não mono</span>, escreva <span class='pill-inline'>apoio</span> nos comentários.</p>
<p class='body-text'>Para receber uma lista de <span class='accent'>terapeutas não mono</span>, envie um direct com a palavra <span class='pill-coral'>terapeutas</span>.</p>
</div>
</body>
</html>
