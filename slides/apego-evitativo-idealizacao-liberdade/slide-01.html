<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;overflow:hidden;background:#1C0D33;font-family:'Inter','Segoe UI',Arial,sans-serif;display:flex;flex-direction:column;justify-content:center;position:relative}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 800px 600px at 50% 0%,#2D1555 0%,transparent 70%),radial-gradient(ellipse 600px 500px at 100% 100%,#0E0620 0%,transparent 60%);pointer-events:none}
.cover{padding:80px;position:relative;z-index:2}
.cover-hero{font-family:'Lora',Georgia,serif;font-size:88px;font-weight:600;line-height:1.15;color:#FFFFFF;margin-bottom:32px}
.accent-coral{color:#F87171;font-style:italic}
.accent{color:#C4B5FD;font-style:italic}
</style></head>
<body>
<div class="cover">
  <h1 class="cover-hero">Apego evitativo se <span class="accent-coral">disfarça</span> de liberdade.</h1>
  <h1 class="cover-hero">É autonomia — ou <span class="accent">esquiva</span>?</h1>
</div>
</body></html>
