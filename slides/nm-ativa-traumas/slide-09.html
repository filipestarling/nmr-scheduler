<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;overflow:hidden;background:#1C0D33;font-family:'Inter','Segoe UI',Arial,sans-serif;display:flex;flex-direction:column;position:relative}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 800px 600px at 50% 0%,#2D1555 0%,transparent 70%),radial-gradient(ellipse 600px 500px at 100% 100%,#0E0620 0%,transparent 60%);pointer-events:none}
.series-top{text-align:center;padding:56px 0 0;font-family:'Lora',Georgia,serif;font-size:32px;font-weight:500;color:#C4B5FD;font-style:italic;position:relative;z-index:2}
.content{flex:1;display:flex;flex-direction:column;justify-content:center;padding:80px;position:relative;z-index:2;gap:56px}
.question{font-family:'Lora',Georgia,serif;font-size:72px;font-weight:600;line-height:1.2;color:#FFFFFF}
.question .accent-coral{color:#F87171;font-style:italic}
.question .accent{color:#C4B5FD;font-style:italic}
.divider{width:72px;height:3px;background:linear-gradient(90deg,#7C3AED,#C4B5FD);border-radius:2px}
.cta-button{display:inline-flex;align-items:center;background:#7C3AED;color:#FFFFFF;font-size:36px;font-weight:600;padding:26px 60px;border-radius:100px;width:fit-content}
</style></head>
<body>
<div class="series-top">@naomonogamiaresponsavel</div>
<div class="content">
  <h2 class="question">Você já se sentiu <span class="accent-coral">desproporcionalmente</span> afetado em alguma relação?</h2>
  <div class="divider"></div>
  <h2 class="question">Faz <span class="accent">sentido</span> pra você?</h2>
  <span class="cta-button">Comenta aqui 💜</span>
</div>
</body></html>
