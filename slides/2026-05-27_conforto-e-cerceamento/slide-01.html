<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;overflow:hidden;background:#1C0D33;font-family:'Inter','Segoe UI',Arial,sans-serif;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 900px 700px at 50% 30%,#2D1555 0%,transparent 65%),radial-gradient(ellipse 500px 500px at 80% 85%,#0E0620 0%,transparent 60%);pointer-events:none}
.capa-inner{display:flex;flex-direction:column;align-items:center;gap:48px;position:relative;z-index:2;padding:80px;text-align:center}
.capa-tag{font-family:'Inter',sans-serif;font-size:28px;font-weight:600;color:#7C3AED;letter-spacing:0.12em;text-transform:uppercase}
.capa-title{font-family:'Lora',Georgia,serif;font-size:88px;font-weight:600;line-height:1.15;color:#FFFFFF}
.accent-coral{color:#F87171;font-style:italic}
.accent{color:#C4B5FD;font-style:italic}
.capa-divider{width:96px;height:3px;background:linear-gradient(90deg,#7C3AED,#C4B5FD);border-radius:2px}
.capa-sub{font-family:'Lora',Georgia,serif;font-size:52px;font-weight:400;font-style:italic;color:#C4B5FD;line-height:1.3}
.swipe-footer{padding:40px 80px 56px;position:absolute;bottom:0;right:0;z-index:2}
.swipe-hint{font-size:32px;color:#C4B5FD;font-weight:600;letter-spacing:0.02em}
</style></head>
<body>
<div class="capa-inner">
  <span class="capa-tag">não monogamia</span>
  <h1 class="capa-title" style="font-size:76px">Quando o <span class="accent">conforto</span> depende do <span class="accent-coral">cerceamento</span> alheio.</h1>
  <div class="capa-divider"></div>
  <p class="capa-sub">Segurança emocional não se constrói controlando o outro.</p>
</div>
<div class="swipe-footer"><span class="swipe-hint">arraste →</span></div>
</body></html>
