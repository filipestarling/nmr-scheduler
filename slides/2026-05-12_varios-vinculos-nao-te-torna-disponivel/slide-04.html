<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;overflow:hidden;background:#1C0D33;font-family:'Inter','Segoe UI',Arial,sans-serif;display:flex;flex-direction:column;position:relative}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 800px 600px at 50% 0%,#2D1555 0%,transparent 70%),radial-gradient(ellipse 600px 500px at 100% 100%,#0E0620 0%,transparent 60%);pointer-events:none}
.series-top{text-align:center;padding:56px 0 0;font-family:'Lora',Georgia,serif;font-size:32px;font-weight:500;color:#C4B5FD;font-style:italic;position:relative;z-index:2}
.content{flex:1;display:flex;flex-direction:column;justify-content:center;padding:80px;position:relative;z-index:2;gap:40px}
.headline{font-family:'Lora',Georgia,serif;font-size:62px;font-weight:600;line-height:1.2;color:#FFFFFF}
.accent-coral{color:#F87171;font-style:italic}
.accent{color:#C4B5FD;font-style:italic}
.divider{width:72px;height:3px;background:linear-gradient(90deg,#7C3AED,#C4B5FD);border-radius:2px}
.list{display:flex;flex-direction:column;gap:24px}
.list-item{font-size:36px;font-weight:500;color:#E2D9F3;line-height:1.5;padding-left:52px;position:relative}
.list-item::before{content:'→';position:absolute;left:0;color:#7C3AED;font-weight:700}
.note{font-size:34px;font-weight:500;color:#C4B5FD;font-style:italic;line-height:1.5}
</style></head>
<body>
<div class="series-top">@naomonogamiaresponsavel</div>
<div class="content">
  <h2 class="headline">Disponibilidade <span class="accent-coral">emocional</span> envolve:</h2>
  <div class="divider"></div>
  <div class="list">
    <p class="list-item">Estar presente e atento ao outro</p>
    <p class="list-item">Constância mínima ao longo do tempo</p>
    <p class="list-item">Abertura para afetar e ser afetado</p>
    <p class="list-item">Disposição para reparar quando há dor</p>
  </div>
  <p class="note">Isso não se multiplica com o número de <span class="accent">relações</span>.</p>
</div>
</body></html>
