<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;overflow:hidden;background:#1C0D33;font-family:'Inter','Segoe UI',Arial,sans-serif;display:flex;flex-direction:column;position:relative}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 800px 600px at 50% 0%,#2D1555 0%,transparent 70%),radial-gradient(ellipse 600px 500px at 100% 100%,#0E0620 0%,transparent 60%);pointer-events:none}
.content{flex:1;display:flex;flex-direction:column;justify-content:center;padding:100px 80px;position:relative;z-index:2;gap:48px}
.cover-hero{font-family:'Lora',Georgia,serif;font-size:96px;font-weight:600;line-height:1.15;color:#FFFFFF;letter-spacing:-0.01em}
.cover-hero .accent-coral{color:#F87171;font-style:italic}
.cover-hero .accent{color:#C4B5FD;font-style:italic}
.divider{width:88px;height:4px;background:linear-gradient(90deg,#7C3AED,#C4B5FD);border-radius:2px}
.swipe-footer{padding:40px 80px 56px;position:relative;z-index:2;display:flex;justify-content:flex-end}
.swipe-hint{font-size:32px;color:#C4B5FD;font-weight:600;letter-spacing:0.02em}
</style></head>
<body>
<div class="content">
  <h1 class="cover-hero">Ter vários vínculos não te torna <span class="accent-coral">disponível</span>.</h1>
  <div class="divider"></div>
  <h1 class="cover-hero">Presença não se <span class="accent">multiplica</span> automaticamente.</h1>
</div>
<div class="swipe-footer"><span class="swipe-hint">arraste →</span></div>
</body></html>
